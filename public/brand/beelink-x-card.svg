<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="78%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#c2562a" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#8f3d1c" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#1a1d1f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="#1a1d1f"/>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Brand mark + eyebrow, top-left -->
  <g transform="translate(60,60)">
    <rect width="80" height="80" rx="14" fill="#f4f1ea"/>
    <text x="40" y="58" text-anchor="middle"
          font-family="Fraunces, Georgia, serif"
          font-style="italic" font-weight="900" font-size="60"
          fill="#c2562a" letter-spacing="-0.5">S</text>
    <line x1="22" y1="68" x2="58" y2="68" stroke="#1a1d1f" stroke-width="2.4"/>
  </g>
  <text x="160" y="92"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="18" letter-spacing="6" fill="#c2562a">THE ISAAC STANDARD</text>
  <text x="160" y="124"
        font-family="'Spline Sans', system-ui, sans-serif"
        font-size="22" fill="#f4f1ea" fill-opacity="0.7">Mini PCs · Hands-on</text>

  <!-- Main wordmark -->
  <text x="60" y="380"
        font-family="Fraunces, Georgia, serif"
        font-weight="900" font-size="140" fill="#f4f1ea" letter-spacing="-3">Beelink GTi13</text>

  <text x="60" y="540"
        font-family="Fraunces, Georgia, serif"
        font-style="italic" font-weight="500" font-size="84"
        fill="#c2562a" letter-spacing="-1.5">Buy it for the dock,</text>
  <text x="60" y="630"
        font-family="Fraunces, Georgia, serif"
        font-style="italic" font-weight="500" font-size="84"
        fill="#c2562a" letter-spacing="-1.5">not the CPU.</text>

  <!-- Rating chip, bottom-right -->
  <g transform="translate(1240,720)">
    <rect width="300" height="140" rx="20" fill="#f4f1ea"/>
    <text x="150" y="80" text-anchor="middle"
          font-family="Fraunces, Georgia, serif"
          font-weight="900" font-size="80" fill="#1a1d1f">4.2</text>
    <text x="150" y="118" text-anchor="middle"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="20" letter-spacing="4" fill="#8f3d1c">/ 5  HONEST</text>
  </g>
</svg>
