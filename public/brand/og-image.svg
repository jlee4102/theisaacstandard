<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Paper background with subtle grain effect via gradients -->
  <defs>
    <radialGradient id="warm" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c2562a" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#8f3d1c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f4f1ea" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#f4f1ea"/>
  <rect width="1200" height="630" fill="url(#warm)"/>
  <!-- Mark, large -->
  <g transform="translate(80,180)">
    <rect width="180" height="180" rx="28" fill="#1a1d1f"/>
    <circle cx="22" cy="22" r="3.4" fill="#c2562a" opacity="0.85"/>
    <circle cx="158" cy="22" r="3.4" fill="#c2562a" opacity="0.85"/>
    <circle cx="22" cy="158" r="3.4" fill="#c2562a" opacity="0.85"/>
    <circle cx="158" cy="158" r="3.4" fill="#c2562a" opacity="0.85"/>
    <text x="90" y="124"
          text-anchor="middle"
          font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-style="italic" font-weight="900" font-size="125"
          fill="#c2562a" letter-spacing="-1.5">S</text>
    <line x1="56" y1="146" x2="124" y2="146" stroke="#f4f1ea" stroke-width="4" stroke-linecap="square"/>
    <line x1="56" y1="146" x2="56" y2="156" stroke="#f4f1ea" stroke-width="4"/>
    <line x1="90" y1="146" x2="90" y2="153" stroke="#f4f1ea" stroke-width="3"/>
    <line x1="124" y1="146" x2="124" y2="156" stroke="#f4f1ea" stroke-width="4"/>
  </g>
  <!-- Wordmark -->
  <text x="300" y="240"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="22" letter-spacing="7" fill="#8f3d1c">THE STANDARD</text>
  <line x1="300" y1="262" x2="500" y2="262" stroke="#c2562a" stroke-width="3"/>
  <text x="300" y="370"
        font-family="Fraunces, 'Playfair Display', Georgia, serif"
        font-weight="900" font-size="108" fill="#1a1d1f" letter-spacing="-2.5">Isaac</text>
  <text x="300" y="478"
        font-family="Fraunces, 'Playfair Display', Georgia, serif"
        font-style="italic" font-weight="500" font-size="108"
        fill="#c2562a" letter-spacing="-1.5">Standard</text>
  <!-- Tagline -->
  <text x="300" y="546"
        font-family="'Spline Sans', system-ui, sans-serif"
        font-size="26" fill="#4a4f54">Honest gear, held to a higher bar.</text>
</svg>
