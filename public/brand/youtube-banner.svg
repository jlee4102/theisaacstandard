<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="2560" height="1440">
  <!-- ============================================
       YouTube Channel Banner — 2560 × 1440
       Safe area for all devices: 1546 × 423 centered
       Safe area bounds:  x:507  y:508  to  x:2053  y:931
       Keep critical content inside that center band.
       ============================================ -->

  <defs>
    <radialGradient id="warmGlow" cx="78%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#c2562a" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#8f3d1c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f4f1ea" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="20%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#1a1d1f" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f4f1ea" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="#f4f1ea"/>
      <circle cx="20" cy="30" r="0.4" fill="#1a1d1f" opacity="0.08"/>
      <circle cx="60" cy="70" r="0.3" fill="#1a1d1f" opacity="0.06"/>
      <circle cx="95" cy="20" r="0.5" fill="#1a1d1f" opacity="0.07"/>
      <circle cx="40" cy="100" r="0.3" fill="#1a1d1f" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1440" fill="url(#grain)"/>
  <rect width="2560" height="1440" fill="url(#warmGlow)"/>
  <rect width="2560" height="1440" fill="url(#leftGlow)"/>

  <!-- Decorative horizontal rules at top and bottom (outside safe area) -->
  <line x1="0" y1="120" x2="2560" y2="120" stroke="#ddd6c8" stroke-width="1"/>
  <line x1="0" y1="1320" x2="2560" y2="1320" stroke="#ddd6c8" stroke-width="1"/>
  <text x="160" y="100"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="22" letter-spacing="6" fill="#8a9097">EST. 2026 · INDEPENDENT REVIEWS · THEISAACSTANDARD.COM</text>
  <text x="160" y="1380"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="22" letter-spacing="6" fill="#8a9097">NEW REVIEW EVERY SUNDAY · NO SPONSORED FLUFF</text>

  <!-- ============ SAFE AREA CONTENT (1546 × 423) ============ -->
  <!-- Mark on left side of safe area -->
  <g transform="translate(560,560)">
    <rect width="320" height="320" rx="38" fill="#1a1d1f"/>
    <circle cx="36" cy="36" r="6" fill="#c2562a" opacity="0.85"/>
    <circle cx="284" cy="36" r="6" fill="#c2562a" opacity="0.85"/>
    <circle cx="36" cy="284" r="6" fill="#c2562a" opacity="0.85"/>
    <circle cx="284" cy="284" r="6" fill="#c2562a" opacity="0.85"/>
    <text x="160" y="220"
          text-anchor="middle"
          font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-style="italic" font-weight="900" font-size="220"
          fill="#c2562a" letter-spacing="-3">S</text>
    <line x1="98" y1="258" x2="222" y2="258" stroke="#f4f1ea" stroke-width="7" stroke-linecap="square"/>
    <line x1="98" y1="258" x2="98" y2="276" stroke="#f4f1ea" stroke-width="7"/>
    <line x1="160" y1="258" x2="160" y2="273" stroke="#f4f1ea" stroke-width="6"/>
    <line x1="222" y1="258" x2="222" y2="276" stroke="#f4f1ea" stroke-width="7"/>
  </g>

  <!-- Wordmark + tagline on right side of safe area -->
  <g transform="translate(940,570)">
    <text x="0" y="60"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="34" letter-spacing="10" fill="#8f3d1c">THE STANDARD</text>
    <line x1="0" y1="86" x2="300" y2="86" stroke="#c2562a" stroke-width="4"/>
    <text x="0" y="226"
          font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-weight="900" font-size="160" fill="#1a1d1f" letter-spacing="-4">Isaac</text>
    <text x="0" y="380"
          font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-style="italic" font-weight="500" font-size="160"
          fill="#c2562a" letter-spacing="-3">Standard</text>
  </g>

  <!-- Tagline below wordmark, still inside safe area -->
  <text x="940" y="960"
        font-family="'Spline Sans', system-ui, sans-serif"
        font-size="44" font-weight="400" fill="#4a4f54">Honest gear, held to a higher bar.</text>

  <!-- Decorative chips outside safe area (only visible on TV/wider crops) -->
  <g transform="translate(160,640)" opacity="0.7">
    <rect width="280" height="56" rx="28" fill="#fffdf8" stroke="#ddd6c8"/>
    <text x="140" y="36"
          text-anchor="middle"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="20" letter-spacing="3" fill="#4a4f54">BUDGET AUDIO</text>
  </g>
  <g transform="translate(160,720)" opacity="0.7">
    <rect width="280" height="56" rx="28" fill="#fffdf8" stroke="#ddd6c8"/>
    <text x="140" y="36"
          text-anchor="middle"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="20" letter-spacing="3" fill="#4a4f54">SMART HOME</text>
  </g>
  <g transform="translate(160,800)" opacity="0.7">
    <rect width="280" height="56" rx="28" fill="#fffdf8" stroke="#ddd6c8"/>
    <text x="140" y="36"
          text-anchor="middle"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="20" letter-spacing="3" fill="#4a4f54">MINI PCs</text>
  </g>

  <g transform="translate(2120,640)" opacity="0.7">
    <rect width="280" height="56" rx="28" fill="#fffdf8" stroke="#ddd6c8"/>
    <text x="140" y="36"
          text-anchor="middle"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="20" letter-spacing="3" fill="#4a4f54">TRACKERS</text>
  </g>
  <g transform="translate(2120,720)" opacity="0.7">
    <rect width="280" height="56" rx="28" fill="#fffdf8" stroke="#ddd6c8"/>
    <text x="140" y="36"
          text-anchor="middle"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="20" letter-spacing="3" fill="#4a4f54">OUTDOOR ROBOTS</text>
  </g>
</svg>
