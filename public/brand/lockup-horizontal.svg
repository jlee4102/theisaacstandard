<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 96" width="480" height="96" role="img" aria-label="The Isaac Standard">
  <!-- Mark on the left -->
  <g transform="translate(8,16)">
    <rect width="64" height="64" rx="10" fill="#1a1d1f"/>
    <circle cx="8" cy="8" r="1.2" fill="#c2562a" opacity="0.85"/>
    <circle cx="56" cy="8" r="1.2" fill="#c2562a" opacity="0.85"/>
    <circle cx="8" cy="56" r="1.2" fill="#c2562a" opacity="0.85"/>
    <circle cx="56" cy="56" r="1.2" fill="#c2562a" opacity="0.85"/>
    <text x="32" y="44"
          text-anchor="middle"
          font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-style="italic"
          font-weight="900"
          font-size="44"
          fill="#c2562a"
          letter-spacing="-0.5">S</text>
    <line x1="20" y1="52" x2="44" y2="52" stroke="#f4f1ea" stroke-width="1.4" stroke-linecap="square"/>
    <line x1="20" y1="52" x2="20" y2="55" stroke="#f4f1ea" stroke-width="1.4"/>
    <line x1="32" y1="52" x2="32" y2="54.5" stroke="#f4f1ea" stroke-width="1.2"/>
    <line x1="44" y1="52" x2="44" y2="55" stroke="#f4f1ea" stroke-width="1.4"/>
  </g>
  <!-- Wordmark on the right -->
  <g transform="translate(92,0)">
    <!-- Eyebrow + rule -->
    <text x="0" y="28"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="9"
          letter-spacing="2.6"
          fill="#8f3d1c">THE</text>
    <line x1="30" y1="25" x2="78" y2="25" stroke="#c2562a" stroke-width="1.2"/>
    <!-- Main wordmark -->
    <text x="0" y="68"
          font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-weight="900"
          font-size="40"
          fill="#1a1d1f"
          letter-spacing="-1">Isaac</text>
    <text x="118" y="68"
          font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-style="italic"
          font-weight="500"
          font-size="40"
          fill="#c2562a"
          letter-spacing="-0.5">Standard</text>
  </g>
</svg>
