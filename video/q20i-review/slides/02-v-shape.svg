<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#f4f1ea"/>
  <text x="120" y="200" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="26" letter-spacing="8" fill="#8f3d1c">SOUND PROFILE</text>
  <text x="120" y="380" font-family="Fraunces, Georgia, serif" font-weight="900" font-size="160" fill="#1a1d1f" letter-spacing="-4">V-shaped</text>
  <text x="120" y="540" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="500" font-size="100" fill="#c2562a">tuning</text>

  <!-- Frequency-response sketch -->
  <g transform="translate(120,640)">
    <line x1="0" y1="160" x2="1680" y2="160" stroke="#ddd6c8" stroke-width="2"/>
    <path d="M 0 80 L 280 100 L 560 200 L 840 240 L 1120 220 L 1400 120 L 1680 80" fill="none" stroke="#c2562a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="320" font-family="'JetBrains Mono', monospace" font-size="22" fill="#4a4f54">20 Hz</text>
    <text x="560" y="320" font-family="'JetBrains Mono', monospace" font-size="22" fill="#4a4f54" text-anchor="middle">200 Hz</text>
    <text x="840" y="320" font-family="'JetBrains Mono', monospace" font-size="22" fill="#4a4f54" text-anchor="middle">1 kHz</text>
    <text x="1120" y="320" font-family="'JetBrains Mono', monospace" font-size="22" fill="#4a4f54" text-anchor="middle">5 kHz</text>
    <text x="1680" y="320" font-family="'JetBrains Mono', monospace" font-size="22" fill="#4a4f54" text-anchor="end">20 kHz</text>
    <text x="100" y="50" font-family="'JetBrains Mono', monospace" font-size="22" fill="#1a1d1f" font-weight="500">BASS LIFT</text>
    <text x="700" y="280" font-family="'JetBrains Mono', monospace" font-size="22" fill="#1a1d1f" font-weight="500">MID SCOOP</text>
    <text x="1480" y="50" font-family="'JetBrains Mono', monospace" font-size="22" fill="#1a1d1f" font-weight="500">TREBLE LIFT</text>
  </g>
</svg>
